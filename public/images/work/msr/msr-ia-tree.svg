<text fill="#1D1C1B" style="white-space: pre" xml:space="preserve" font-family="Lora" font-size="16" font-style="italic" letter-spacing="0em"><tspan x="176" y="996.856">Symptoms live in a tag rail, not in the nav. A man with cracked heels shouldn't have to know whether the answer is a routine, a guide, or a review. The tag pulls relevant content from all three. The nav stays clean; </tspan><tspan x="176" y="1020.86">the symptom does the routing.</tspan></text>
